<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat en Tiempo Real - Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-container" class="container">
    <div class="card login-card">
      <div class="card-header">
        <h1 id="auth-title">Iniciar Sesión</h1>
        <p class="subtitle" id="auth-subtitle">Ingresa tus credenciales para acceder al chat</p>
      </div>

      <!-- Toggle Tabs -->
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active">Iniciar Sesión</button>
        <button id="tab-register" class="auth-tab">Registrarse</button>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" autocomplete="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary">Ingresar al Chat</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label for="register-email">Correo electrónico</label>
          <input type="email" id="register-email" autocomplete="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label for="register-username">Nombre de pantalla</label>
          <input type="text" id="register-username" autocomplete="off" maxlength="32" placeholder="Ej. JuanPerez" required>
          <span class="char-counter" id="register-char-counter">0/32</span>
        </div>
        <div class="form-group">
          <label for="register-password">Contraseña</label>
          <input type="password" id="register-password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" required>
        </div>
        <div id="register-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary">Crear Cuenta</button>
      </form>
    </div>
  </div>

  <!-- Main Chat Workspace -->
  <div id="main-container" class="container hidden">
    <!-- Sidebar: Channels -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Canales</h2>
      </div>
      
      <div class="channels-section">
        <ul id="channels-list">
          <!-- Channels loaded dynamically -->
        </ul>
      </div>

      <div class="sidebar-footer">
        <form id="create-channel-form">
          <input type="text" id="new-channel-input" autocomplete="off" maxlength="64" placeholder="Nuevo canal..." required>
          <button type="submit" class="btn btn-action-add" title="Crear canal">+</button>
        </form>
        <div id="create-channel-error" class="error-msg hidden"></div>
      </div>
    </aside>

    <!-- Center: Chat Window -->
    <main class="chat-area">
      <header class="chat-header">
        <div class="channel-info">
          <span class="hashtag">#</span>
          <h3 id="active-channel-name">Selecciona un canal</h3>
        </div>
      </header>

      <div class="messages-container" id="messages-container">
        <!-- Messages loaded dynamically -->
        <div class="welcome-message" id="welcome-message">
          <p>Selecciona un canal del panel izquierdo para comenzar a chatear.</p>
        </div>
      </div>

      <footer class="chat-footer">
        <form id="message-form" class="hidden">
          <div class="textarea-wrapper">
            <textarea id="message-input" rows="1" maxlength="2000" placeholder="Enviar mensaje..." required></textarea>
            <div class="chat-input-controls">
              <span class="char-counter" id="message-char-counter">0/2000</span>
            </div>
          </div>
          <div class="chat-actions">
            <button type="button" id="record-btn" class="btn-action-record" title="Grabar mensaje de audio">🎤</button>
            <button type="submit" class="btn btn-send">Enviar</button>
          </div>
        </form>
        
        <!-- Recording Overlay Container (Requirement 1.4) -->
        <div id="recording-container" class="recording-container hidden">
          <span class="recording-indicator"></span>
          <span id="recording-timer" class="recording-timer">00:00</span>
          <button type="button" id="cancel-record-btn" class="btn-record-cancel">Cancelar</button>
          <button type="button" id="stop-record-btn" class="btn-record-stop">Enviar Audio</button>
        </div>

        <div id="message-error" class="error-msg error-msg-toast hidden"></div>
      </footer>
    </main>

    <!-- Right Panel: Info and Connection Count -->
    <section class="info-panel">
      <div class="info-header">
        <h2>Detalles</h2>
      </div>

      <div class="info-body">
        <div class="status-card">
          <span class="status-indicator online"></span>
          <div class="status-text">
            <span class="number" id="connections-count">0</span>
            <span class="label">Usuarios Conectados</span>
          </div>
        </div>

        <div class="user-profile">
          <div class="profile-avatar">
            <span id="profile-initials">U</span>
          </div>
          <div class="profile-details">
            <span class="username" id="current-username">Usuario</span>
            <span class="role">Sesion Activa</span>
          </div>
        </div>
      </div>

      <div class="info-footer">
        <button id="logout-btn" class="btn btn-danger">Salir de la sesion</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
